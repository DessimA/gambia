server:
  port: 8080

spring:
  application:
    name: gambia-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gambia}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret-key: ${JWT_SECRET_KEY:sua_chave_secreta_super_segura_de_32_caracteres_minimo}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  ml:
    service-url: ${ML_SERVICE_URL:http://localhost:8000}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    tags:
      application: gambia-backend
